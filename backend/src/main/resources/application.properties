# ==================== APPLICATION ====================
quarkus.application.name=aether-chatbot
quarkus.application.version=1.0.0

# ==================== HTTP ====================
quarkus.http.port=8080
quarkus.http.cors=true
quarkus.http.cors.origins=http://localhost:3000
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS
quarkus.http.cors.headers=Content-Type,Authorization

# ==================== DATASOURCE (PostgreSQL) ====================
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${POSTGRES_USER:aether}
quarkus.datasource.password=${POSTGRES_PASSWORD:aether123}
quarkus.datasource.jdbc.url=${POSTGRES_URL:jdbc:postgresql://localhost:5432/aetherdb}

# ==================== HIBERNATE ORM ====================
quarkus.hibernate-orm.database.generation=none
quarkus.hibernate-orm.log.sql=false

# ==================== FLYWAY (migrations) ====================
quarkus.flyway.migrate-at-start=true
quarkus.flyway.baseline-on-migrate=true
quarkus.flyway.locations=classpath:db/migration

# ==================== LLM - OLLAMA (padrao) ====================
quarkus.langchain4j.ollama.base-url=${OLLAMA_BASE_URL:http://localhost:11434}
quarkus.langchain4j.ollama.timeout=120s
quarkus.langchain4j.ollama.chat-model.model-id=${OLLAMA_CHAT_MODEL:llama3.2}
quarkus.langchain4j.ollama.chat-model.temperature=0.7
quarkus.langchain4j.ollama.chat-model.timeout=120s
quarkus.langchain4j.ollama.embedding-model.model-id=${OLLAMA_EMBEDDING_MODEL:nomic-embed-text}
quarkus.langchain4j.ollama.embedding-model.timeout=60s
quarkus.langchain4j.ollama.log-requests=false
quarkus.langchain4j.ollama.log-responses=false

# ==================== LLM - GROQ (fallback) ====================
# Descomente e configure a variavel de ambiente GROQ_API_KEY para usar o Groq
# quarkus.langchain4j.groq.api-key=${GROQ_API_KEY}
# quarkus.langchain4j.groq.chat-model.model-id=llama-3.3-70b-versatile
# quarkus.langchain4j.groq.chat-model.temperature=0.7

# ==================== PGVECTOR (Vector Store) ====================
quarkus.langchain4j.pgvector.dimension=768
quarkus.langchain4j.pgvector.use-index=true
quarkus.langchain4j.pgvector.index-list-size=10

# ==================== RAG ====================
# Caminho para os documentos (para indexacao)
aether.rag.path=${DOCUMENTS_PATH:../documents}

# Configuracoes de chunking
aether.rag.chunk-size=500
aether.rag.chunk-overlap=50
aether.rag.max-results=5
aether.rag.min-score=0.7

# ==================== SECURITY ====================
# Rate limiting: requisicoes por minuto por IP nos endpoints /api/*
aether.security.rate-limit.requests-per-minute=${RATE_LIMIT_RPM:20}

# ==================== OPENAPI / SWAGGER ====================
quarkus.smallrye-openapi.path=/api/openapi
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/swagger-ui

# ==================== LOGGING ====================
quarkus.log.level=INFO
quarkus.log.category."com.aether".level=DEBUG

# ==================== DEV MODE ====================
%dev.quarkus.log.category."com.aether".level=DEBUG
%dev.quarkus.hibernate-orm.log.sql=false
%dev.quarkus.langchain4j.ollama.log-requests=true

# ==================== TEST ====================
%test.quarkus.datasource.db-kind=h2
%test.quarkus.datasource.jdbc.url=jdbc:h2:mem:testdb
%test.quarkus.hibernate-orm.database.generation=drop-and-create